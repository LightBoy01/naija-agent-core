# No top-level build/deploy blocks when using multiple services.
# Each service gets its own configuration.

[[services]]
name = "api"
[services.build]
  builder = "dockerfile"
  dockerfilePath = "Dockerfile"
[services.deploy]
  startCommand = "npm run start:api"
  restartPolicyType = "ON_FAILURE"

[[services]]
name = "worker"
[services.build]
  builder = "dockerfile"
  dockerfilePath = "Dockerfile"
[services.deploy]
  startCommand = "npm run start:worker"
  restartPolicyType = "ON_FAILURE"
