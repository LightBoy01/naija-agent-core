# Corrected railway.toml with exact service names from Railway UI
# This ensures Railway links these settings (Dockerfile builder) to the correct services.

[[services]]
name = "@naija-agent/api"
[services.build]
  builder = "dockerfile"
  dockerfilePath = "Dockerfile"
[services.deploy]
  startCommand = "npm run start:api"
  restartPolicyType = "ON_FAILURE"

[[services]]
name = "@naija-agent/worker"
[services.build]
  builder = "dockerfile"
  dockerfilePath = "Dockerfile"
[services.deploy]
  startCommand = "npm run start:worker"
  restartPolicyType = "ON_FAILURE"
